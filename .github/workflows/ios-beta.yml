name: iOS Beta

on:
  workflow_dispatch:
    inputs:
      lane:
        description: "Fastlane lane to run for staging uploads."
        required: false
        default: beta
        type: choice
        options:
          - beta
      release_version:
        description: "Staging/TestFlight marketing version, e.g. 1.3 or 1.3.1."
        required: true
        type: string

jobs:
  beta:
    name: Upload Staging TestFlight Build
    runs-on: macos-latest
    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}

    steps:
      - name: Require staging branch
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_NAME:-}" != "staging" ]]; then
            echo "This workflow must be run from the staging branch. Current ref: ${GITHUB_REF_NAME:-unknown}" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Bundle install
        run: bundle install --jobs 4 --retry 3

      - name: Resolve beta version parameters
        env:
          WORKFLOW_LANE_INPUT: ${{ github.event.inputs.lane }}
          WORKFLOW_RELEASE_VERSION: ${{ github.event.inputs.release_version }}
        run: |
          set -euo pipefail

          fastlane_lane="${WORKFLOW_LANE_INPUT:-beta}"
          release_version="${WORKFLOW_RELEASE_VERSION:-}"

          echo "FASTLANE_LANE=$fastlane_lane" >> "$GITHUB_ENV"

          if [[ -n "$release_version" ]]; then
            echo "RELEASE_VERSION=$release_version" >> "$GITHUB_ENV"
          fi

          echo "Resolved staging lane: $fastlane_lane"
          echo "Resolved marketing version: ${release_version:-<keep current project version; workflow_dispatch should provide release_version>}"

      - name: Print staging build context
        run: |
          set -euo pipefail

          echo "build_type=staging"
          echo "scheme=GamePedia-Staging"
          echo "configuration=Staging"
          echo "resolved_api_environment=staging"
          echo "upload_destination=TestFlight"
          echo "release_version=${RELEASE_VERSION:-<required>}"
          echo "release_build_number=<resolved in fastlane from latest TestFlight build + 1>"

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Install provisioning profiles
        env:
          BUILD_PROVISION_PROFILE_BASE64_APP: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64_APP }}
          BUILD_PROVISION_PROFILE_BASE64_WIDGET: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64_WIDGET }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          
          install_profile() {
            local encoded_profile="$1"
            local label="$2"
            local temp_profile="$RUNNER_TEMP/${label}.mobileprovision"
            local temp_plist="$RUNNER_TEMP/${label}.plist"
            local profile_uuid
            local profile_name

            echo -n "$encoded_profile" | base64 --decode > "$temp_profile"
            security cms -D -i "$temp_profile" > "$temp_plist"

            profile_uuid="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$temp_plist")"
            profile_name="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$temp_plist")"

            cp "$temp_profile" "$HOME/Library/MobileDevice/Provisioning Profiles/$profile_uuid.mobileprovision"

            printf '%s\n' "$profile_name"
          }

          APP_PROFILE_NAME="$(install_profile "$BUILD_PROVISION_PROFILE_BASE64_APP" "GamePedia-App")"
          WIDGET_PROFILE_NAME="$(install_profile "$BUILD_PROVISION_PROFILE_BASE64_WIDGET" "GamePedia-Widget")"

          echo "APP_STORE_PROVISIONING_PROFILE_NAME=$APP_PROFILE_NAME" >> "$GITHUB_ENV"
          echo "APP_STORE_WIDGET_PROVISIONING_PROFILE_NAME=$WIDGET_PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Run Fastlane beta lane (staging -> TestFlight)
        # staging owns automated TestFlight distribution for pre-release QA.
        env:
          CI: "true"
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ env.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ env.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ env.APP_STORE_CONNECT_PRIVATE_KEY }}
          APP_STORE_APP_IDENTIFIER: ${{ secrets.APP_STORE_APP_IDENTIFIER }}
          FASTLANE_LANE: ${{ env.FASTLANE_LANE }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          set -euo pipefail

          fastlane_args=(ios "${FASTLANE_LANE}")

          if [[ -n "${RELEASE_VERSION:-}" ]]; then
            fastlane_args+=("release_version:${RELEASE_VERSION}")
          fi

          bundle exec fastlane "${fastlane_args[@]}"
