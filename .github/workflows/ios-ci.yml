name: iOS CI

on:
  pull_request:
    branches:
      - dev
      - staging
      - main

jobs:
  ci-build:
    name: Build and Test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Bundle install
        run: bundle install --jobs 4 --retry 3

      - name: Run Fastlane CI lane
        env:
          CI: "true"
        run: bundle exec fastlane ios ci_build
