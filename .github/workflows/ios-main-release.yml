name: iOS Main Release

on:
  workflow_dispatch:
    inputs:
      lane:
        description: "Fastlane lane to run for production uploads."
        required: false
        default: release
        type: choice
        options:
          - release
          - release_upload
      release_version:
        description: "Release marketing version, e.g. 1.2. Leave blank to keep the current project value."
        required: false
        type: string
      build_number:
        description: "Optional build number override. Leave blank to auto-increment from App Store Connect."
        required: false
        type: string
  push:
    tags:
      - "v*"

jobs:
  upload-production-build:
    name: Upload Production Release Build
    runs-on: macos-latest
    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Bundle install
        run: bundle install --jobs 4 --retry 3

      - name: Resolve release version parameters
        env:
          WORKFLOW_LANE_INPUT: ${{ github.event.inputs.lane }}
          WORKFLOW_RELEASE_VERSION: ${{ github.event.inputs.release_version }}
          WORKFLOW_BUILD_INPUT: ${{ github.event.inputs.build_number }}
        run: |
          set -euo pipefail

          fastlane_lane="${WORKFLOW_LANE_INPUT:-release}"
          release_version="${WORKFLOW_RELEASE_VERSION:-}"
          release_build="${WORKFLOW_BUILD_INPUT:-}"

          echo "FASTLANE_LANE=$fastlane_lane" >> "$GITHUB_ENV"

          if [[ -z "$release_version" && "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            release_version="${GITHUB_REF_NAME#v}"
          fi

          if [[ -n "$release_version" ]]; then
            echo "RELEASE_VERSION=$release_version" >> "$GITHUB_ENV"
          fi

          if [[ -n "$release_build" ]]; then
            echo "RELEASE_BUILD_NUMBER=$release_build" >> "$GITHUB_ENV"
          fi

          echo "Resolved production lane: $fastlane_lane"
          echo "Resolved marketing version: ${release_version:-<keep current project version>}"
          echo "Resolved build number override: ${release_build:-<auto increment from App Store Connect>}"

      - name: Print production build context
        run: |
          set -euo pipefail

          echo "build_type=production"
          echo "scheme=GamePedia-Prod"
          echo "configuration=Release"
          echo "resolved_api_environment=production"
          echo "upload_destination=App Store Connect"
          echo "release_version=${RELEASE_VERSION:-<keep current project version>}"
          echo "release_build_number=${RELEASE_BUILD_NUMBER:-<resolved in fastlane>}"

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Install provisioning profiles
        env:
          BUILD_PROVISION_PROFILE_BASE64_APP: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64_APP }}
          BUILD_PROVISION_PROFILE_BASE64_WIDGET: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64_WIDGET }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"

          install_profile() {
            local encoded_profile="$1"
            local label="$2"
            local temp_profile="$RUNNER_TEMP/${label}.mobileprovision"
            local temp_plist="$RUNNER_TEMP/${label}.plist"
            local profile_uuid
            local profile_name

            echo -n "$encoded_profile" | base64 --decode > "$temp_profile"
            security cms -D -i "$temp_profile" > "$temp_plist"

            profile_uuid="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$temp_plist")"
            profile_name="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$temp_plist")"

            cp "$temp_profile" "$HOME/Library/MobileDevice/Provisioning Profiles/$profile_uuid.mobileprovision"

            printf '%s\n' "$profile_name"
          }

          APP_PROFILE_NAME="$(install_profile "$BUILD_PROVISION_PROFILE_BASE64_APP" "GamePedia-App")"
          WIDGET_PROFILE_NAME="$(install_profile "$BUILD_PROVISION_PROFILE_BASE64_WIDGET" "GamePedia-Widget")"

          echo "APP_STORE_PROVISIONING_PROFILE_NAME=$APP_PROFILE_NAME" >> "$GITHUB_ENV"
          echo "APP_STORE_WIDGET_PROVISIONING_PROFILE_NAME=$WIDGET_PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Upload production build to App Store Connect (main -> production)
        # staging owns TestFlight automation; main uploads only on manual or release-tag triggers.
        env:
          CI: "true"
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ env.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ env.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ env.APP_STORE_CONNECT_PRIVATE_KEY }}
          APP_STORE_APP_IDENTIFIER: ${{ secrets.APP_STORE_APP_IDENTIFIER }}
          FASTLANE_LANE: ${{ env.FASTLANE_LANE }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          RELEASE_BUILD_NUMBER: ${{ env.RELEASE_BUILD_NUMBER }}
        run: |
          set -euo pipefail

          fastlane_args=(ios "${FASTLANE_LANE}")

          if [[ -n "${RELEASE_VERSION:-}" ]]; then
            fastlane_args+=("release_version:${RELEASE_VERSION}")
          fi

          if [[ -n "${RELEASE_BUILD_NUMBER:-}" ]]; then
            fastlane_args+=("build_number:${RELEASE_BUILD_NUMBER}")
          fi

          bundle exec fastlane "${fastlane_args[@]}"
